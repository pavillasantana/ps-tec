<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato | PSTec</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <header class="navbar">
        <div class="logo">PSTec</div>
        <nav class="nav-links">
            <a href="index.html" data-i18n="navHome">Home</a>
            <a href="servicos.html" data-i18n="navServicos">Serviços</a>
            <a href="projetos.html" data-i18n="navProjetos">Projetos</a>
            <a href="sobre.html" data-i18n="navSobre">Sobre</a>
            <a href="contato.html" data-i18n="navContato">Contato</a>
        </nav>
        <div class="lang-switch">
            <button class="lang-btn active" data-lang="pt">PT</button>
            <button class="lang-btn" data-lang="es">ES</button>
            <button class="lang-btn" data-lang="en">EN</button>
        </div>
    </header>

    <main>
        <section class="contact-section">
            <div class="contact-container">
                <div class="section-header centered">
                    <h2 data-i18n="contatoTitle">Vamos decolar o seu projeto?</h2>
                    <p data-i18n="contatoDesc" class="subtitle">Selecione o serviço desejado e entraremos em contato rapidamente.</p>
                </div>
                
                <!-- O ID 'my-form' é essencial para o script.js processar o envio via AJAX -->
                <form class="contact-form" id="my-form">

    <div class="input-group">
        <label for="nome" data-i18n="formName"></label>
        <input id="nome" type="text" name="nome" autocomplete="name" required>
    </div>

    <div class="input-group">
        <label for="contato" data-i18n="formEmail"></label>
        <input id="contato" type="email" name="contato" autocomplete="email" required>
    </div>

    <div class="input-group">
        <label for="referencia" data-i18n="formReferencia"></label>
        <input id="referencia" type="text" name="referencia" data-i18n-placeholder="phReferencia" autocomplete="off" required>
    </div>

    <div class="input-group">
        <label for="objetivo" data-i18n="formGoal"></label>
        <select id="objetivo" name="objetivo" required>
            <option data-i18n="opt1"></option>
            <option data-i18n="opt2"></option>
            <option data-i18n="opt3"></option>
        </select>
    </div>

    <button type="submit" class="btn-primary" data-i18n="formSubmit"></button>

</form>
            </div>
        </section>
    </main>

    <a href="https://wa.me/541176419463" id="whatsapp-btn" class="float-whatsapp" target="_blank" rel="noopener noreferrer" aria-label="Fale conosco no WhatsApp">
        <span class="wa-icon">💬</span> <span data-i18n="btnWhatsapp">Fale conosco</span>
    </a>

    <script type="module" src="script.js"></script>


    <div id="success-modal" class="modal-overlay" style="display: none;">
    <div class="modal-content">
        <div class="modal-icon">✅</div>
        <h3 data-i18n="modalTitle">Enviado com Sucesso!</h3>
        <p data-i18n="modalDesc">Recebemos sua mensagem. Em breve entraremos em contato para decolar seu projeto.</p>
        <button onclick="closeModal()" class="btn-primary">OK</button>
    </div>
</div>
</body>




</html>
